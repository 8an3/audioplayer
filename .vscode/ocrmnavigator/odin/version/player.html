<head>
  <meta charset="UTF-8">

  <title>MIÐGARÐR SÐK - MUSIC PLAYER</title>
  <link rel="stylesheet" href="vt.css">

<body>
  <div class="music-player" id="playerRoot">
    <div class="album-art-container">

      <svg class="curved-text-svg" viewBox="0 0 300 300">
        <defs>
          <path id="leftCurve" d="M 50, 150 A 100, 100 0 1, 1 50, 151" />
          <path id="rightCurve" d="M 250, 150 A 100, 100 0 1, 0 250, 149" />
        </defs>

        <text class="vinyl-text">
          <textPath href="#leftCurve" startOffset="50%" text-anchor="middle">
            MIÐGARÐR SÐK
          </textPath>
        </text>

        <text class="vinyl-text">
          <textPath href="#rightCurve" startOffset="50%" text-anchor="middle">
            Skyler Zanth
          </textPath>
        </text>
      </svg>

      <div class="album-art-wrapper" id="albumWrapper">
        <img id="albumArt" class="album-art" src="record/darthvader.svg" onerror="this.src='record/darthvader.svg'"
          alt="Album art">
      </div>
    </div>

    <div class="song-info" id="uiFade">
      <h2 id="songTitle" class="song-title">MIÐGARÐR SÐK</h2>
      <p id="artistName" class="artist-name">MUSIC PLAYER</p>
    </div>

    <div class="controls ui-fadeable" id="uiFade3">
      <button id="shuffleBtn" class="control-btn" title="Shuffle">
        <img src="icons/random.svg" width="20" height="20" alt="Shuffle">
      </button>
      <button id="prevBtn" class="control-btn" title="Previous">
        <img src="icons/back.svg" width="28" height="28" alt="Previous">
      </button>
      <button id="playPauseBtn" class="play-btn" title="Play/Pause">
        <img id="playIcon" src="icons/play.svg" width="32" height="32" alt="Play">
        <img id="pauseIcon" src="icons/pause.svg" width="32" height="32" alt="Pause" style="display:none">
      </button>
      <button id="nextBtn" class="control-btn" title="Next">
        <img src="icons/next.svg" width="28" height="28" alt="Next">
      </button>
      <button id="repeatBtn" class="control-btn" title="Repeat">
        <img id="repeatIcon" src="icons/repeat.svg" width="20" height="20" alt="Repeat">
      </button>
    </div>

    <div class="progress-container ui-fadeable" id="uiFade2">
      <span id="currentTime" class="time-current">00:00</span>
      <div class="progress-bar-wrapper">
        <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0">
      </div>
      <span id="duration" class="time-duration">00:00</span>
    </div>

    <div class="volume-container ui-fadeable" id="uiFade4">
      <span class="volume-label">
        <img src="icons/volume.svg" width="20" height="20" alt="Volume">
      </span>
      <input type="range" id="volumeBoost" class="volume-slider" min="0" max="300" value="100">
      <span id="boostValue" class="boost-value">100%</span>
    </div>

    <button id="togglePlaylistBtn" class="playlist-toggle ui-fadeable">
      <img src="icons/note.svg" width="16" height="16" alt="Playlist">
    </button>

    <div id="playlist" class="playlist hidden"></div>

    <div class="bottom-bar  ui-fadeable">
      <button id="selectFolder" class="folder-btn" title="Open Folder">
        <img src="icons/folder.svg" width="20" height="20" alt="Open Folder">
